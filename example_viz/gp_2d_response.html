<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GP Posterior — Hartmann-6</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f0f11;
    color: #e0e0e0;
    padding: 2rem;
    min-height: 100vh;
  }
  h1 { font-size: 18px; font-weight: 500; color: #f0f0f0; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }

  .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
  label { font-size: 13px; color: #aaa; }
  select, button {
    font-size: 13px; padding: 5px 10px;
    border-radius: 6px; border: 0.5px solid #444;
    background: #1a1a1d; color: #e0e0e0; cursor: pointer;
    outline: none;
  }
  button { border-color: #555; }
  button:hover { background: #252528; }
  select:focus, button:focus { border-color: #888; }

  .plots { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
  .plot { display: flex; flex-direction: column; gap: 6px; }
  .plot-title { font-size: 12px; color: #888; text-align: center; letter-spacing: 0.04em; }
  .canvas-wrap { position: relative; display: inline-block; }
  canvas.main {
    display: block; border-radius: 6px;
    border: 0.5px solid #333; cursor: crosshair;
  }
  canvas.overlay { position: absolute; top: 0; left: 0; pointer-events: none; }

  .cbrow { display: flex; align-items: center; gap: 6px; }
  .cblbl { font-size: 11px; color: #666; min-width: 32px; }
  canvas.cbar { height: 8px; flex: 1; border-radius: 3px; }

  .section-label {
    font-size: 11px; color: #555; letter-spacing: 0.06em;
    text-transform: uppercase; margin: 18px 0 10px;
  }
  .slrow { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
  .sllbl { font-size: 13px; color: #888; min-width: 68px; }
  input[type=range] {
    flex: 1; min-width: 100px; accent-color: #7c6ff7;
    cursor: pointer;
  }
  .slval { font-size: 13px; font-weight: 500; color: #ccc; min-width: 40px; text-align: right; }

  .statline {
    font-size: 13px; color: #777;
    margin-top: 14px; min-height: 1.5em;
  }
  .statline span { font-weight: 500; color: #ddd; }

  #tooltip {
    position: fixed;
    display: none;
    background: #1e1e22;
    border: 0.5px solid #555;
    border-radius: 7px;
    padding: 9px 13px;
    font-size: 12px;
    color: #ccc;
    pointer-events: none;
    z-index: 100;
    line-height: 1.8;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  #tooltip .tt-title {
    font-size: 11px; color: #888; letter-spacing: 0.05em;
    text-transform: uppercase; margin-bottom: 4px;
  }
  #tooltip .tt-val { color: #ff6b6b; font-weight: 500; }
  #tooltip .tt-coord { color: #a0c4ff; }

  .n-samples-row { display: flex; gap: 10px; align-items: center; }
  .n-samples-row input[type=range] { width: 110px; min-width: unset; flex: unset; }
  #nLabel { font-size: 13px; font-weight: 500; color: #ccc; min-width: 28px; }
</style>
</head>
<body>

<h1>GP Posterior — Hartmann-6</h1>
<p class="subtitle" id="subtitle">12 random training points · RBF kernel · 2D slice viewer</p>

<div class="controls">
  <label>X axis <select id="selX"></select></label>
  <label>Y axis <select id="selY"></select></label>
  <label class="n-samples-row">
    n =
    <input type="range" id="nSlider" min="4" max="150" step="1" value="12">
    <span id="nLabel">12</span>
  </label>
  <button id="btnR">resample ↺</button>
</div>

<div id="tooltip">
  <div class="tt-title">training point</div>
  <div id="tt-body"></div>
</div>

<div class="plots">
  <div class="plot">
    <div class="plot-title">posterior mean</div>
    <div class="canvas-wrap">
      <canvas id="cvM" class="main" width="320" height="320"></canvas>
      <canvas id="ovM" class="overlay" width="320" height="320"></canvas>
    </div>
    <div class="cbrow">
      <span class="cblbl" id="mlo">—</span>
      <canvas id="cbM" class="cbar"></canvas>
      <span class="cblbl" id="mhi" style="text-align:right">—</span>
    </div>
  </div>
  <div class="plot">
    <div class="plot-title">predictive std</div>
    <div class="canvas-wrap">
      <canvas id="cvS" class="main" width="320" height="320"></canvas>
      <canvas id="ovS" class="overlay" width="320" height="320"></canvas>
    </div>
    <div class="cbrow">
      <span class="cblbl">0.00</span>
      <canvas id="cbS" class="cbar"></canvas>
      <span class="cblbl" id="shi" style="text-align:right">—</span>
    </div>
  </div>
</div>

<div class="section-label">Fixed dimensions</div>
<div id="sliders"></div>
<div class="statline" id="statline">hover over either map to inspect · red dots = training points projected onto chosen axes</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const N   = 320;   // canvas pixel size
const GS  = 80;    // grid resolution (GS x GS predictions per render)
let nSamples = 12; // configurable via slider

// Hartmann-6 parameters
const XOPT = [0.20169, 0.150011, 0.476874, 0.275332, 0.311652, 0.6573];
const ALPHA_H = [1.0, 1.2, 3.0, 3.2];
const A_H = [
  [10, 3, 17, 3.5, 1.7, 8],
  [0.05, 10, 17, 0.1, 8, 14],
  [3, 3.5, 1.7, 10, 17, 8],
  [17, 8, 0.05, 10, 0.1, 14],
];
const P_H = [
  [1312, 1696, 5569, 124, 8283, 5886],
  [2329, 4135, 8307, 3736, 1004, 9991],
  [2348, 1451, 3522, 2883, 3047, 6650],
  [4047, 8828, 8732, 5743, 1091, 381],
].map(row => row.map(v => v * 1e-4));

// GP hyperparameters
const LS = 0.35;   // lengthscale
const SV = 3.0;    // signal variance
const NV = 0.02;   // noise variance

// ─── Hartmann-6 ───────────────────────────────────────────────────────────────
function hartmann6(x) {
  let s = 0;
  for (let i = 0; i < 4; i++) {
    let inner = 0;
    for (let j = 0; j < 6; j++) inner += A_H[i][j] * (x[j] - P_H[i][j]) ** 2;
    s += ALPHA_H[i] * Math.exp(-inner);
  }
  return -s;
}

// ─── GP kernel (RBF) ──────────────────────────────────────────────────────────
function rbf(a, b) {
  let sq = 0;
  for (let i = 0; i < 6; i++) sq += (a[i] - b[i]) ** 2;
  return SV * Math.exp(-0.5 * sq / (LS * LS));
}

// ─── Cholesky decomposition ───────────────────────────────────────────────────
function cholesky(A) {
  const n = A.length;
  const L = Array.from({ length: n }, () => new Float64Array(n));
  for (let i = 0; i < n; i++) {
    for (let j = 0; j <= i; j++) {
      let s = A[i][j];
      for (let k = 0; k < j; k++) s -= L[i][k] * L[j][k];
      L[i][j] = (i === j) ? Math.sqrt(Math.max(s, 1e-10)) : s / L[j][j];
    }
  }
  return L;
}

function forwardSolve(L, b) {
  const n = b.length, x = new Float64Array(n);
  for (let i = 0; i < n; i++) {
    let s = b[i];
    for (let j = 0; j < i; j++) s -= L[i][j] * x[j];
    x[i] = s / L[i][i];
  }
  return x;
}

function backSolve(L, b) {
  const n = b.length, x = new Float64Array(n);
  for (let i = n - 1; i >= 0; i--) {
    let s = b[i];
    for (let j = i + 1; j < n; j++) s -= L[j][i] * x[j];
    x[i] = s / L[i][i];
  }
  return x;
}

// ─── GP state ─────────────────────────────────────────────────────────────────
let trainX, trainY, cholL, alpha;

function fitGP() {
  trainX = Array.from({ length: nSamples }, () =>
    Array.from({ length: 6 }, () => Math.random())
  );
  trainY = trainX.map(hartmann6);

  const n = trainX.length;
  const K = Array.from({ length: n }, (_, i) =>
    Array.from({ length: n }, (_, j) =>
      rbf(trainX[i], trainX[j]) + (i === j ? NV : 0)
    )
  );
  cholL = cholesky(K);
  alpha = backSolve(cholL, forwardSolve(cholL, trainY));
}

function gpPredict(xs) {
  const ks   = trainX.map(xi => rbf(xi, xs));
  let   mu   = 0;
  for (let i = 0; i < trainX.length; i++) mu += ks[i] * alpha[i];
  const v    = forwardSolve(cholL, ks);
  let   vari = SV;
  for (let i = 0; i < v.length; i++) vari -= v[i] * v[i];
  return { mean: mu, std: Math.sqrt(Math.max(0, vari)) };
}

// ─── Colormaps ────────────────────────────────────────────────────────────────
function viridis(t) {
  t = Math.max(0, Math.min(1, t));
  const c = [
    [68,1,84],[72,32,111],[63,64,153],[50,101,176],[38,130,142],
    [63,151,120],[92,170,98],[140,188,80],[195,203,72],[253,231,37],
  ];
  const idx = t * (c.length - 1);
  const lo = Math.floor(idx), hi = Math.min(lo + 1, c.length - 1), f = idx - lo;
  return c[lo].map((v, k) => Math.round(v + f * (c[hi][k] - v)));
}

function plasma(t) {
  t = Math.max(0, Math.min(1, t));
  const c = [
    [13,8,135],[75,3,161],[125,3,168],[168,34,150],[203,70,121],
    [229,107,93],[245,144,66],[252,180,36],[241,229,29],
  ];
  const idx = t * (c.length - 1);
  const lo = Math.floor(idx), hi = Math.min(lo + 1, c.length - 1), f = idx - lo;
  return c[lo].map((v, k) => Math.round(v + f * (c[hi][k] - v)));
}

// ─── UI state ─────────────────────────────────────────────────────────────────
let axX = 0, axY = 1;
let fixed = [...XOPT];

// Populate axis selectors
const selX = document.getElementById('selX');
const selY = document.getElementById('selY');
for (let i = 0; i < 6; i++) {
  [selX, selY].forEach(sel => {
    const o = document.createElement('option');
    o.value = i; o.textContent = `x${i + 1}`;
    sel.appendChild(o);
  });
}
selX.value = 0; selY.value = 1;

function buildSliders() {
  const div = document.getElementById('sliders');
  div.innerHTML = '';
  const axes = new Set([axX, axY]);
  for (let i = 0; i < 6; i++) {
    if (axes.has(i)) continue;
    const row = document.createElement('div'); row.className = 'slrow';
    const lbl = document.createElement('span'); lbl.className = 'sllbl';
    lbl.textContent = `x${i + 1} (fixed)`;
    const sl = document.createElement('input');
    sl.type = 'range'; sl.min = 0; sl.max = 1; sl.step = 0.001;
    sl.value = fixed[i].toFixed(3);
    const val = document.createElement('span'); val.className = 'slval';
    val.textContent = (+sl.value).toFixed(3);
    sl.addEventListener('input', () => {
      fixed[i] = +sl.value;
      val.textContent = (+sl.value).toFixed(3);
      render();
    });
    row.appendChild(lbl); row.appendChild(sl); row.appendChild(val);
    div.appendChild(row);
  }
}

// ─── Canvas contexts ──────────────────────────────────────────────────────────
const ctxM  = document.getElementById('cvM').getContext('2d');
const ctxS  = document.getElementById('cvS').getContext('2d');
const ctxOM = document.getElementById('ovM').getContext('2d');
const ctxOS = document.getElementById('ovS').getContext('2d');

function drawColorbar(canvasId, cfn) {
  const cvs = document.getElementById(canvasId);
  cvs.width = cvs.offsetWidth || 200;
  const ctx = cvs.getContext('2d');
  const w = cvs.width;
  for (let i = 0; i < w; i++) {
    const [r, g, b] = cfn(i / w);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(i, 0, 1, 8);
  }
}

const tooltip    = document.getElementById('tooltip');
const ttBody     = document.getElementById('tt-body');
const HOVER_R    = 9; // px hit radius for training point hover

// Returns index of nearest training point within HOVER_R px, or -1
function nearestPoint(canvasPx, canvasPy) {
  let best = -1, bestD = HOVER_R;
  trainX.forEach((pt, i) => {
    const dx = pt[axX] * N - canvasPx;
    const dy = (1 - pt[axY]) * N - canvasPy;
    const d  = Math.sqrt(dx*dx + dy*dy);
    if (d < bestD) { bestD = d; best = i; }
  });
  return best;
}

function drawOverlays(hx, hy, hoveredIdx) {
  [ctxOM, ctxOS].forEach(ctx => {
    ctx.clearRect(0, 0, N, N);

    // Crosshair
    if (hx !== undefined) {
      ctx.beginPath();
      ctx.moveTo(hx, 0); ctx.lineTo(hx, N);
      ctx.moveTo(0, hy); ctx.lineTo(N, hy);
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    // Axis labels
    ctx.font = '12px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText(`x${axX + 1} →`, N - 52, N - 8);
    ctx.save();
    ctx.translate(14, 60);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText(`x${axY + 1} →`, 0, 0);
    ctx.restore();

    // Training points (projected)
    trainX.forEach((pt, i) => {
      const px = pt[axX] * N;
      const py = (1 - pt[axY]) * N;
      const isHovered = (i === hoveredIdx);
      const outerR = isHovered ? 7.5 : 5;
      const innerR = isHovered ? 4   : 2.5;

      ctx.beginPath(); ctx.arc(px, py, outerR, 0, 2 * Math.PI);
      ctx.strokeStyle = isHovered ? 'rgba(255,255,255,1)' : 'rgba(255,255,255,0.85)';
      ctx.lineWidth = isHovered ? 2 : 1.5;
      ctx.stroke();

      ctx.beginPath(); ctx.arc(px, py, innerR, 0, 2 * Math.PI);
      ctx.fillStyle = isHovered ? 'rgba(255,110,110,1)' : 'rgba(255,60,60,0.95)';
      ctx.fill();
    });
  });
}

// ─── Main render ──────────────────────────────────────────────────────────────
function render() {
  const imgM = ctxM.createImageData(N, N);
  const imgS = ctxS.createImageData(N, N);
  const means = [], stds = [];

  // Evaluate GP on GS×GS grid
  for (let gj = 0; gj < GS; gj++) {
    for (let gi = 0; gi < GS; gi++) {
      const xv = gi / (GS - 1);
      const yv = 1 - gj / (GS - 1);
      const x = [...fixed];
      x[axX] = xv;
      x[axY] = yv;
      const { mean, std } = gpPredict(x);
      means.push(mean);
      stds.push(std);
    }
  }

  const meanMin = Math.min(...means);
  const meanMax = Math.max(...means);
  const stdMax  = Math.max(...stds);
  const meanRange = meanMax - meanMin || 1;

  // Paint pixels
  const cellW = N / GS, cellH = N / GS;
  for (let k = 0; k < means.length; k++) {
    const gi = k % GS, gj = Math.floor(k / GS);
    const tm = (means[k] - meanMin) / meanRange;
    const ts = stds[k] / (stdMax || 1);
    const [mr, mg, mb] = viridis(tm);
    const [sr, sg, sb] = plasma(ts);
    const x0 = Math.round(gi * cellW),  y0 = Math.round(gj * cellH);
    const x1 = Math.round((gi + 1) * cellW), y1 = Math.round((gj + 1) * cellH);
    for (let py = y0; py < y1; py++) {
      for (let px = x0; px < x1; px++) {
        const idx = (py * N + px) * 4;
        imgM.data[idx]   = mr; imgM.data[idx+1] = mg; imgM.data[idx+2] = mb; imgM.data[idx+3] = 255;
        imgS.data[idx]   = sr; imgS.data[idx+1] = sg; imgS.data[idx+2] = sb; imgS.data[idx+3] = 255;
      }
    }
  }

  ctxM.putImageData(imgM, 0, 0);
  ctxS.putImageData(imgS, 0, 0);

  document.getElementById('mlo').textContent = meanMin.toFixed(2);
  document.getElementById('mhi').textContent = meanMax.toFixed(2);
  document.getElementById('shi').textContent = stdMax.toFixed(2);

  drawColorbar('cbM', viridis);
  drawColorbar('cbS', plasma);
  drawOverlays(undefined, undefined, -1);
}

// ─── Mouse inspect ────────────────────────────────────────────────────────────
function onMouseMove(e) {
  const rect = e.target.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  const xv = Math.max(0, Math.min(1, px / N));
  const yv = Math.max(0, Math.min(1, 1 - py / N));

  const hitIdx = nearestPoint(px, py);

  if (hitIdx >= 0) {
    // Hovering a training point — show tooltip
    const pt = trainX[hitIdx];
    const fv = trainY[hitIdx];
    ttBody.innerHTML =
      `<span class="tt-val">f = ${fv.toFixed(5)}</span><br>` +
      pt.map((v, i) =>
        `<span class="tt-coord">x${i+1}</span> = ${v.toFixed(4)}`
      ).join('<br>');
    tooltip.style.display = 'block';
    // Position tooltip offset from cursor, flip if near edge
    const tx = e.clientX + 16;
    const ty = e.clientY - 10;
    tooltip.style.left = tx + 'px';
    tooltip.style.top  = ty + 'px';

    document.getElementById('statline').innerHTML =
      `point #${hitIdx + 1} &nbsp; f = <span>${fv.toFixed(5)}</span>`;

    e.target.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    e.target.style.cursor = 'crosshair';

    const x = [...fixed]; x[axX] = xv; x[axY] = yv;
    const { mean, std } = gpPredict(x);
    document.getElementById('statline').innerHTML =
      `x${axX+1} = <span>${xv.toFixed(3)}</span> &nbsp;`+
      `x${axY+1} = <span>${yv.toFixed(3)}</span> &nbsp;&nbsp;`+
      `μ = <span>${mean.toFixed(4)}</span> &nbsp;&nbsp;`+
      `σ = <span>${std.toFixed(4)}</span>`;
  }

  drawOverlays(px, py, hitIdx);
}

function onMouseLeave() {
  tooltip.style.display = 'none';
  drawOverlays(undefined, undefined, -1);
  document.getElementById('statline').innerHTML =
    'hover over either map to inspect · red dots = training points projected onto chosen axes';
}

document.getElementById('cvM').addEventListener('mousemove', onMouseMove);
document.getElementById('cvS').addEventListener('mousemove', onMouseMove);
document.getElementById('cvM').addEventListener('mouseleave', onMouseLeave);
document.getElementById('cvS').addEventListener('mouseleave', onMouseLeave);

// ─── Control wiring ───────────────────────────────────────────────────────────
selX.addEventListener('change', () => {
  axX = +selX.value;
  if (axX === axY) { axY = (axX + 1) % 6; selY.value = axY; }
  buildSliders(); render();
});
selY.addEventListener('change', () => {
  axY = +selY.value;
  if (axX === axY) { axX = (axY + 1) % 6; selX.value = axX; }
  buildSliders(); render();
});

const nSlider = document.getElementById('nSlider');
const nLabel  = document.getElementById('nLabel');
nSlider.addEventListener('input', () => {
  nSamples = +nSlider.value;
  nLabel.textContent = nSamples;
});
nSlider.addEventListener('change', () => {
  nSamples = +nSlider.value;
  nLabel.textContent = nSamples;
  fitGP();
  updateSubtitle();
  render();
});

document.getElementById('btnR').addEventListener('click', () => {
  fitGP();
  updateSubtitle();
  render();
});

function updateSubtitle() {
  document.getElementById('subtitle').textContent =
    `${nSamples} random training points · RBF kernel · 2D slice viewer`;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
fitGP();
buildSliders();
render();
</script>
</body>
</html>
